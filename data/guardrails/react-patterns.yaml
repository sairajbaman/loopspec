name: react-patterns
description: React/Next.js best practice rules
rules:
  - category: general
    rule: Prefer Server Components — only add 'use client' when using hooks/events
  - category: general
    rule: Extract reusable logic into custom hooks
  - category: general
    rule: Use React.memo only after measuring performance issues
  - category: general
    rule: Never mutate state directly — always use setter functions
  - category: general
    rule: Keep components under 200 lines — split if larger
  - category: general
    rule: Use named exports for components (not default exports)
  - category: general
    rule: Co-locate related files (component + test + styles)
  - category: general
    rule: Use Suspense boundaries for async data loading
  - category: general
    rule: Handle all Promise rejections (no unhandled async errors)
  - category: general
    rule: Avoid prop drilling beyond 2 levels — use composition or context
