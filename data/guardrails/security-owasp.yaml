name: security-owasp
description: OWASP Top 10 prevention rules
rules:
  - category: security
    rule: Always use parameterized queries, never string concatenation for SQL
  - category: security
    rule: Validate and sanitize all user inputs on the server side
  - category: security
    rule: Never store passwords in plaintext — use bcrypt or argon2
  - category: security
    rule: Implement rate limiting on authentication endpoints
  - category: security
    rule: Use CSRF tokens for state-changing operations
  - category: security
    rule: Set secure, httpOnly, sameSite flags on session cookies
  - category: security
    rule: Never expose stack traces or internal errors to users
  - category: security
    rule: Validate file uploads — check MIME type, size, and extension
  - category: security
    rule: Use Content-Security-Policy headers
  - category: security
    rule: Never store secrets in client-side code or version control
